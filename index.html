<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tenho uma pergunta 💖</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial, Helvetica, sans-serif;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      max-width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 22px;
      color: #e91e63;
    }

    p {
      font-size: 16px;
      margin: 15px 0;
    }

    .buttons {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
    }

    .yes {
      background: #e91e63;
      color: white;
    }

    .yes:hover {
      background: #d81b60;
    }

    .no {
      background: #ccc;
    }
  </style>
</head>
<body>

  <div class="card" id="card">
    <h1>💌 Tenho algo pra te perguntar…</h1>
    <p>
      Desde que você entrou na minha vida,  
      tudo ficou mais leve, mais bonito e mais verdadeiro.
    </p>
    <p><strong>Você aceita namorar comigo?</strong> 💖</p>

    <div class="buttons">
      <button class="yes" onclick="aceitou()">Sim 😍</button>
      <button class="no" onclick="negou()">Não 🙈</button>
    </div>
  </div>

  <script>
    function aceitou() {
      document.getElementById("card").innerHTML = `
        <h1>🎉💖 AAAAAA! 💖🎉</h1>
        <p>Prometo cuidar de você, te respeitar e fazer você sorrir todos os dias.</p>
        <p><strong>Te amo! 💕</strong></p>
      `;
    }

    function negou() {
      alert("Opção inválida 😌💖");
    }
  </script>

</body>
</html>
