<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Para: Vitória ♡</title>

    <!-- Biblioteca de Confetes -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <style>
      :root {
        --primary: #ff85a1;
        --dark: #4a4e69;
        --bg: #fdf0f0;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg);
        overflow-x: hidden;
      }

      /* Tela de Entrada */
      #loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #1a1a2e;
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        transition: opacity 1s ease;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid rgba(255, 255, 255, 0.1);
        border-left-color: #ff85a1;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .btn-interativo {
        background-color: var(--primary);
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 50px;
        cursor: pointer;
        font-weight: bold;
        font-size: 16px;
        margin-top: 20px;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }
      .btn-interativo:hover {
        transform: translateY(-4px) scale(1.05);
        box-shadow: 0 8px 15px rgba(255, 133, 161, 0.3);
      }

      /* LAYOUT EM 3 COLUNAS */
      .wrapper {
        display: none;
        width: 100%;
        min-height: 100vh;
        box-sizing: border-box;
        padding: 20px;
        align-items: center;
        justify-content: center;
        gap: 30px;
      }

      /* Colunas de Fotos */
      .photo-column {
        display: flex;
        flex-direction: column;
        gap: 20px;
        justify-content: center;
        align-items: center;
        width: 150px;
        opacity: 0;
        transition: opacity 1.5s ease;
      }

      .photo-column.show-photos {
        opacity: 1;
      }

      /* Foto Quadrada Elegante */
      .square-photo {
        width: 140px;
        height: 140px;
        object-fit: cover; /* Corta e centraliza a imagem sem distorcer */
        border-radius: 15px; /* Bordas levemente arredondadas */
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15); /* Sombra suave para dar destaque */
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
        cursor: pointer;
      }

      .square-photo:hover {
        transform: scale(1.08) translateY(-5px);
        box-shadow: 0 15px 25px rgba(0, 0, 0, 0.25);
      }

      /* Card Central */
      .container {
        text-align: center;
        padding: 30px;
        background: white;
        border-radius: 30px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        max-width: 450px;
        width: 100%;
        flex-grow: 1;
        box-sizing: border-box;
        z-index: 10;
      }

      .heart-icon {
        font-size: 40px;
        color: var(--primary);
        margin-bottom: 15px;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }

      #story-text {
        font-size: 17px;
        color: #555;
        line-height: 1.8;
        margin-bottom: 25px;
        min-height: 100px;
      }

      .btn-group {
        display: none;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
        height: 50px;
      }
      button {
        padding: 12px 35px;
        border: none;
        border-radius: 50px;
        font-weight: bold;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
      }
      .btn-yes {
        background-color: var(--primary);
        color: white;
      }
      .btn-no {
        background-color: #eee;
        color: #888;
        position: relative;
      }

      .success-page {
        display: none;
      }

      /* Responsivo para Celular - Fotos organizadas e centralizadas */
@media (max-width: 850px) {
  .wrapper { 
    flex-direction: column; 
    overflow-y: auto; 
    height: auto; 
    padding: 30px 15px; 
    box-sizing: border-box;
  }
  
  .photo-column { 
    flex-direction: row; 
    width: 100%; 
    justify-content: center; /* Centraliza as fotos na tela do celular */
    gap: 15px; /* Cria um espaço fixo e idêntico entre as imagens */
    padding: 10px 0;
  }
  
  .square-photo { 
    width: 130px; /* Ajusta o tamanho para caber duas fotos lado a lado sem sumir */
    height: 130px; 
    flex-shrink: 0; 
  }
}

    </style>
  </head>
  <body>
    <!-- MÚSICAS E SONS -->
    <audio id="audioInicial" loop>
      <source src="http" type="audio/mpeg" />
    </audio>
    <audio id="audioInicio" loop>
      <source src="https://files.catbox.moe/293hk5.mp3" type="audio/mpeg" />
    </audio>
    <audio id="audioSucesso">
      <source src="https://files.catbox.moe/59jbgo.mp3" type="audio/mpeg" />
    </audio>
    <audio id="audioTeclado" loop>
      <source src="https://files.catbox.moe/jgjcgg.m4a" type="audio/mp4" />
    </audio>

    <div id="loader">
      <div class="spinner"></div>
      <p id="load-text" style="margin-top: 20px; color: white">
        Sincronizando sentimentos...
      </p>
      <button onclick="startExperience()" class="btn-interativo">
        Abrir com Amor ❤️
      </button>
    </div>

    <div class="wrapper" id="main-wrapper">
      <!-- COLUNA DA ESQUERDA (Substitua as URLs pelas suas fotos do Catbox) -->
      <div class="photo-column" id="photos-left">
        <img
          src="https://files.catbox.moe/du7wef.jpg"
          alt="Foto 1"
          class="square-photo"
        />
        <img
          src="https://files.catbox.moe/cvrwdc.png"
          alt="Foto 2"
          class="square-photo"
        />
      </div>

      <!-- CARD CENTRAL DA HISTÓRIA -->
      <div class="container" id="main-card">
        <div id="content">
          <div class="heart-icon">❤️</div>
          <div id="story-text"></div>

          <div class="btn-group" id="buttons">
            <button class="btn-yes" onclick="celebrate()">Sim! 😍</button>
            <button class="btn-no" id="btn-no" onmouseover="moveNo()">
              Não 🙄
            </button>
          </div>
        </div>

        <div id="success" class="success-page">
          <div class="heart-icon">💖</div>
          <h1 style="color: var(--dark)">Oficialmente Namorados!</h1>
          <p>
            Obrigado por fazer parte da minha vida de um jeito tão especial. Te
            amo, Vitória! 🥰
          </p>
        </div>
      </div>

      <!-- COLUNA DA DIREITA (Substitua as URLs pelas suas fotos do Catbox) -->
      <div class="photo-column" id="photos-right">
        <img
          src="https://files.catbox.moe/i7svf5.png"
          alt="Foto 3"
          class="square-photo"
        />
        <img
          src="https://files.catbox.moe/oj3zcs.jpg"
          alt="Foto 4"
          class="square-photo"
        />
      </div>
    </div>

    <script>
      const story =
        "Há quase 2 anos eu via você e sempre tive vontade de conhecer a pessoa que você é... \n\nAté que hoje deu certo. Hoje você faz parte da minha vida de uma forma especial. As conversas e risadas são infinitamente melhores quando é com você e quando você está perto. \n\nJá faz quase 5 meses que estamos mais juntos do que antes, e há dois meses que te declarei meus sentimentos e o meu coração já te escolheu. \n\nPor isso, Vitória, eu preciso te perguntar... Aceita ser minha namorada?";

      // Ativa o som do loader no primeiríssimo clique que ela der na tela
      document.body.addEventListener(
        "click",
        () => {
          const somLoader = document.getElementById("audioLoader");
          // Só toca se o loader ainda estiver visível na tela
          if (
            document.getElementById("loader").style.display !== "none" &&
            somLoader.paused
          ) {
            somLoader.volume = 0.5; // Ajuste o volume aqui
            somLoader
              .play()
              .catch((e) => console.log("Aguardando clique real"));
          }
        },
        { once: true },
      ); // O 'once: true' faz esse detector rodar apenas uma vez

      function startExperience() {
        document.getElementById("loader").style.opacity = "0";
        setTimeout(() => {
          document.getElementById("loader").style.display = "none";
          document.getElementById("main-wrapper").style.display = "flex";
          document
            .getElementById("audioInicio")
            .play()
            .catch((e) => console.log("Sem áudio inicial"));
          typeWriter();

          document.getElementById("photos-left").classList.add("show-photos");
          document.getElementById("photos-right").classList.add("show-photos");
        }, 1000);
      }

      let i = 0;
      function typeWriter() {
        const somTeclado = document.getElementById("audioTeclado");

        if (i === 0 && somTeclado) {
          somTeclado.volume = 0.5;
          somTeclado.play().catch((e) => console.log("Erro áudio"));
        }

        if (i < story.length) {
          document.getElementById("story-text").innerHTML += story
            .charAt(i)
            .replace(/\n/g, "<br>");
          i++;
          setTimeout(typeWriter, 50);
        } else {
          if (somTeclado) {
            somTeclado.pause();
            somTeclado.currentTime = 0;
          }
          document.getElementById("buttons").style.display = "flex";
        }
      }

      function moveNo() {
        const btn = document.getElementById("btn-no");
        const x = Math.random() * (window.innerWidth - btn.offsetWidth);
        const y = Math.random() * (window.innerHeight - btn.offsetHeight);
        btn.style.position = "fixed";
        btn.style.left = x + "px";
        btn.style.top = y + "px";
      }

      function celebrate() {
        document.getElementById("audioInicio").pause();
        document
          .getElementById("audioSucesso")
          .play()
          .catch((e) => console.log("Sem áudio sucesso"));
        document.getElementById("content").style.display = "none";
        document.getElementById("success").style.display = "block";
        document.body.style.backgroundColor = "#ffc0cb";

        var end = Date.now() + 10 * 1000;
        (function frame() {
          confetti({
            particleCount: 4,
            angle: 60,
            spread: 60,
            origin: { x: 0 },
            colors: ["#ff85a1", "#ffffff", "#ff0055"],
          });
          confetti({
            particleCount: 4,
            angle: 120,
            spread: 60,
            origin: { x: 1 },
            colors: ["#ff85a1", "#ffffff", "#ff0055"],
          });
          if (Date.now() < end) requestAnimationFrame(frame);
        })();
      }
    </script>
  </body>
</html>
